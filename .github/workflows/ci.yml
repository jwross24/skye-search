name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Deploy timing guard: NEVER deploy between 11:00 PM and 1:00 AM ET (cron window).
# Vercel auto-deploys on push to main. Avoid merging PRs during that window.

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: bun install --frozen-lockfile

      - name: Start Supabase
        run: supabase start -x realtime,storage-api,imgproxy,mailpit,edge-runtime,logflare,vector,studio,supavisor

      - name: Export Supabase env vars
        run: |
          supabase status -o env | sed 's/^/export /' > /tmp/supabase-env.sh
          source /tmp/supabase-env.sh
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Apply migrations and seed test user
        run: |
          supabase db reset --debug 2>&1 | tail -5
          bun run src/db/seed-to-supabase.ts

      # Immigration-critical tests (unemployment clock, urgency scoring,
      # cap-exempt classification, dedup) all run here and block on failure
      - run: bun run test
        env:
          CI: 'true'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Build needs NEXT_PUBLIC_* vars for client bundle. Values don't matter
      # for build — only used at runtime. Use placeholders.
      - run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://placeholder.invalid
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start Supabase
        run: supabase start -x realtime,storage-api,imgproxy,mailpit,edge-runtime,logflare,vector,studio,supavisor

      - name: Export Supabase env vars
        run: |
          supabase status -o env | sed 's/^/export /' > /tmp/supabase-env.sh
          source /tmp/supabase-env.sh
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Apply migrations and seed
        run: |
          supabase db reset --debug 2>&1 | tail -5
          bun run src/db/seed-to-supabase.ts

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: 'true'

  # Single required status check — add "CI Pass" as the branch protection rule
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, build, e2e]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=("${{ needs.typecheck.result }}" "${{ needs.lint.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}" "${{ needs.e2e.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::CI failed — one or more jobs did not succeed"
              exit 1
            fi
          done
          echo "All CI jobs passed"
